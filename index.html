<script>
const synth = window.speechSynthesis;
const voiceSelect = document.getElementById("voice");
const statusDiv = document.getElementById("status");

let currentUtterance = null;
let isSpeaking = false;
let isPaused = false;

// Load voices
function loadVoices() {
    voiceSelect.innerHTML = "";
    synth.getVoices().forEach(v => {
        let opt = document.createElement("option");
        opt.value = v.name;
        opt.textContent = v.name + " (" + v.lang + ")";
        voiceSelect.appendChild(opt);
    });
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// Create speech
function createUtterance() {
    let text = document.getElementById("text").value;

    if (!text.trim()) {
        statusDiv.innerText = "⚠️ Enter text first";
        return null;
    }

    let u = new SpeechSynthesisUtterance(text);

    let voice = synth.getVoices().find(v => v.name === voiceSelect.value);
    if (voice) u.voice = voice;

    u.rate = document.getElementById("rate").value;
    u.pitch = document.getElementById("pitch").value;

    u.onstart = () => {
        isSpeaking = true;
        isPaused = false;
        statusDiv.innerText = "🔊 Speaking...";
    };

    u.onend = () => {
        isSpeaking = false;
        isPaused = false;
        statusDiv.innerText = "✅ Done";
    };

    u.onpause = () => {
        isPaused = true;
        statusDiv.innerText = "⏸ Paused";
    };

    u.onresume = () => {
        isPaused = false;
        statusDiv.innerText = "▶ Resumed";
    };

    u.onerror = () => {
        isSpeaking = false;
        isPaused = false;
        statusDiv.innerText = "❌ Error occurred";
    };

    return u;
}

// Speak
function speak() {
    synth.cancel();
    currentUtterance = createUtterance();
    if (currentUtterance) synth.speak(currentUtterance);
}

// Pause
function pause() {
    if (isSpeaking && !isPaused) {
        synth.pause();
    }
}

// Resume
function resume() {
    if (isSpeaking && isPaused) {
        synth.resume();
    }
}

// Stop
function stop() {
    if (isSpeaking || isPaused) {
        synth.cancel();
        isSpeaking = false;
        isPaused = false;
        statusDiv.innerText = "⏹ Stopped";
    }
}
</script>
